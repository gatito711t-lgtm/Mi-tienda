<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUESHIN</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Playfair Display', serif;
}

body{
  background:#f8f8f8;
  color:#333;
}

/* HEADER */
header{
  background:#a2cffe;
  text-align:center;
  padding:20px;
}

header h1{
  font-size:22px;
  letter-spacing:2px;
}

/* MENU */
nav{
  margin-top:10px;
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:#333;
  font-weight:bold;
  font-size:14px;
}

nav a:hover{
  color:#000;
}

/* IMAGENES */
.hero{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:20px;
  flex-wrap:wrap;
  text-align:center;
}

.hero div{
  text-align:center;
}

.hero img{
  width:180px;
  border-radius:10px;
}

/* PRODUCTOS */
.productos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.producto{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.producto img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.producto p{
  padding:10px;
}

.producto strong{
  padding:0 10px;
  display:block;
}

/* BOTON */
.boton{
  display:block;
  margin:15px;
  text-align:center;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>BLUESHIN</h1>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Catálogo</a>
    <a href="#">Nosotros</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">

  <div>
    <img src="joyeria.jpg" alt="Joyería BLUESHIN">
    <p>Joyería BLUESHIN</p>
  </div>

  <div>
    <img src="packaging.jpg" alt="Packaging BLUESHIN">
    <p>Packaging BLUESHIN</p>
  </div>

</section>

<section class="productos">

  <div class="producto">
    <img src="https://via.placeholder.com/280" alt="Anillo BLUESHIN">

    <p>Diseño elegante y resistente al agua</p>
    <strong>85 Bs</strong>

    <a href="https://wa.me/59170000000?text=Hola,%20quiero%20comprar%20este%20producto" class="boton">
      Consultar por WhatsApp
    </a>
  </div>

</section>

<footer>
<p>© 2026 BLUESHIN</p>
</footer>

</body>
</html>
