<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUESHIN</title> 
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f8f8f8;
  color:#333;
}

header{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

header h1{
  font-size:32px;
}

header p{
  margin-top:8px;
  color:#ddd;
}

.productos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.producto{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.producto img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.producto h2{
  padding:10px;
}

.producto p{
  padding:0 10px 15px;
}

.boton{
  display:block;
  margin:15px;
  text-align:center;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:white;
}
</style>
</head>
<body>

<header>
<h1>BLUESHIN</h1>
<p>Bienvenido a nuestra tienda</p>
</header>

<section class="productos">

<!-- Aquí van los productos -->

</section>

<footer>
<p>© 2026 BLUESHIN</p>
</footer>

</body>
</html>
